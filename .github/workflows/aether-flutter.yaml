name: Aether Flutter

on:
  repository_dispatch:
    types: [trigger-aether-flutter-workflow]
  workflow_dispatch:
    inputs:
      android-build-type:
        description: 'Android build type'
        required: true
        default: 'aab'
        type: choice
        options:
        - apk
        - aab
        - both
      env:
        description: target env
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod
      git-ref:
        description: git ref
        required: true
        default: main
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - android
        - web
        - macos
        - ios
      ios-export-method:
        description: 'iOS export method'
        required: false
        default: 'app-store'
        type: choice
        options:
        - app-store
        - ad-hoc

# If another release happens while this workflow is still running,
# cancel the earlier run in favor of the next run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.env || github.event.inputs.env }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Aether Flutter App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - shell: bash
        env:
          BRANCH_OR_TAG: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO_AF }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone -b $BRANCH_OR_TAG --single-branch "https://ameya-ff:$GH_TOKEN@github.com/$OWNER/$REPO.git" tmp

      - id: set_build_name
        shell: bash
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          cd tmp
          PUBSPEC_VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2)
          BASE_VERSION=$(echo $PUBSPEC_VERSION | cut -d '+' -f 1)
          
          if [[ "${ENV}" == "dev" ]]; then
            GIT_SHA=$(git rev-parse --short HEAD)
            BUILD_NAME="${BASE_VERSION}-dev.${GIT_SHA}"
          else
            BUILD_NAME="${BASE_VERSION}"
          fi
          
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          
          COMMIT_MESSAGE=$(git log --pretty=format:"%s" -n 1)
          if [[ -n "$COMMIT_MESSAGE" ]]; then
            echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          fi

      - id: set_version_code
        shell: bash
        run: |
          # Generate a unique version code based on timestamp
          VERSION_CODE=$(date +%s)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Generated version code: $VERSION_CODE"

      - run: rsync -a --remove-source-files tmp/ .

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: stable
          flutter-version-file: pubspec.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: |
            android/build.gradle.kts
            android/app/build.gradle.kts
            android/gradle/wrapper/gradle-wrapper.properties

      - uses: actions/cache@v3
        with:
          path: |
            **/flutter/.pub
            **/flutter/bin
            **/flutter/packages
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Cache Dart tool
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-dart-tool-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-dart-tool-

      - run: flutter pub get
      - name: Setup PowerSync Web assets (sqlite3.wasm + workers)
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'web' }}
        run: dart run powersync:setup_web
      - run: dart run build_runner build -d
      - run: flutter --version


      # Web build steps
      - name: Build Web
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'web' }}
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: flutter build web --dart-define-from-file=env/$ENV.json --release
      
      - name: Deploy to Netlify
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'web' }}
        uses: ameya-ff/actions-netlify@ameya
        with:
          publish-dir: './build/web'
          production-branch: main
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
          enable-commit-status: true
          overwrites-pull-request-comment: false
          owner: ${{ secrets.OWNER }}
          repo: ${{ secrets.REPO_AF }}
          sha: ${{ github.event.client_payload.sha || github.sha }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ (github.event.client_payload.env || github.event.inputs.env) == 'prod' && secrets.NETLIFY_SITE_ID_AETHER_PROD || secrets.NETLIFY_SITE_ID_AETHER_DEV }}
        timeout-minutes: 1

      # Android build steps
      - name: Setup Android Keystore from Secrets
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'android' }}
        env:
          ANDROID_KEYPROPERTIES_BASE_64: ${{ secrets.AETHER_ANDROID_KEYPROPERTIES_BASE_64 }}
          ANDROID_KEYSTORE_BASE_64: ${{ secrets.AETHER_ANDROID_KEYSTORE_BASE_64 }}
        run: |
          ./scripts/android_setup.sh

      - name: Build APK
        if: ${{ (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'android') && (github.event.inputs.android-build-type == 'apk' || github.event.inputs.android-build-type == 'both' || github.event.client_payload.android-build-type == 'apk' || github.event.client_payload.android-build-type == 'both') }}
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          flutter build apk --split-per-abi --target-platform android-arm64 --build-name ${{ steps.set_build_name.outputs.build_name }} --build-number ${{ steps.set_version_code.outputs.version_code }} --dart-define-from-file=env/$ENV.json --no-pub --flavor $ENV

      - name: Build AAB (Android App Bundle)
        if: ${{ (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'android') && (github.event.inputs.android-build-type == 'aab' || github.event.inputs.android-build-type == 'both' || github.event.client_payload.android-build-type == 'aab' || github.event.client_payload.android-build-type == 'both') }}
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          flutter build appbundle --build-name ${{ steps.set_build_name.outputs.build_name }} --build-number ${{ steps.set_version_code.outputs.version_code }} --dart-define-from-file=env/$ENV.json --no-pub --flavor $ENV

      - name: Get signing report for release
        if: ${{ (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'android') && (github.event.inputs.android-build-type == 'apk' || github.event.inputs.android-build-type == 'both' || github.event.client_payload.android-build-type == 'apk' || github.event.client_payload.android-build-type == 'both') }}
        run: |
          cd android
          ./gradlew signingReport > ../build/app/outputs/flutter-apk/signing_report.txt
          cd ..

      - uses: ryand56/r2-upload-action@latest
        name: Upload APK files
        if: ${{ (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'android') && (github.event.inputs.android-build-type == 'apk' || github.event.inputs.android-build-type == 'both' || github.event.client_payload.android-build-type == 'apk' || github.event.client_payload.android-build-type == 'both') }}
        with:
          r2-account-id: ${{ secrets.CF_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CF_R2_ACCESS_KEY }}
          r2-secret-access-key: ${{ secrets.CF_R2_SECRET_KEY }}
          r2-bucket: ${{ secrets.CF_R2_BUCKET }}
          source-dir: build/app/outputs/flutter-apk
          destination-dir: ${{ github.workflow }}-${{ github.event.client_payload.env || github.event.inputs.env }}
          output-file-url: false
          multipart-size: 100
          max-retries: 5
          multipart-concurrent: true
          keep-file-fresh: true

      - uses: ryand56/r2-upload-action@latest
        name: Upload AAB files
        if: ${{ (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'android') && (github.event.inputs.android-build-type == 'aab' || github.event.inputs.android-build-type == 'both' || github.event.client_payload.android-build-type == 'aab' || github.event.client_payload.android-build-type == 'both') }}
        with:
          r2-account-id: ${{ secrets.CF_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CF_R2_ACCESS_KEY }}
          r2-secret-access-key: ${{ secrets.CF_R2_SECRET_KEY }}
          r2-bucket: ${{ secrets.CF_R2_BUCKET }}
          source-dir: build/app/outputs/bundle/${{ github.event.client_payload.env || github.event.inputs.env }}Release
          destination-dir: ${{ github.workflow }}-${{ github.event.client_payload.env || github.event.inputs.env }}
          output-file-url: false
          multipart-size: 100
          max-retries: 5
          multipart-concurrent: true
          keep-file-fresh: true

      - name: Upload to Google Play Store
        uses: r0adkll/upload-google-play@v1
        if: ${{ (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'android') && (github.event.inputs.android-build-type == 'aab' || github.event.inputs.android-build-type == 'both' || github.event.client_payload.android-build-type == 'aab' || github.event.client_payload.android-build-type == 'both') }}
        with:
            serviceAccountJsonPlainText: ${{ secrets.GCP_GKE_GITHUB_ACTIONS_SA_KEY }}
            packageName: ${{ secrets.AETHER_PLAY_STORE_PACKAGE_NAME }}
            releaseFiles: build/app/outputs/bundle/${{ github.event.client_payload.env || github.event.inputs.env }}Release/*.aab
            track: internal
            status: draft

      - name: Tag commit
        if: ${{ github.event.client_payload.env == 'dev' || github.event.inputs.env == 'dev' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO_AF }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.set_build_name.outputs.build_name }}"
          git push "https://ameya-ff:$GH_TOKEN@github.com/$OWNER/$REPO.git" "${{ steps.set_build_name.outputs.build_name }}"

  build-macos:
    name: Build Aether Flutter App (macOS)
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - shell: bash
        env:
          BRANCH_OR_TAG: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO_AF }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone -b $BRANCH_OR_TAG --single-branch "https://ameya-ff:$GH_TOKEN@github.com/$OWNER/$REPO.git" tmp

      - id: set_build_name
        shell: bash
        env:
          BRANCH_OR_TAG: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          if [[ "${ENV}" == "dev" ]]; then
            BUILD_NAME="$(date +'%Y%m%d%H%M').0.0"
            echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
            echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          else
            BUILD_NAME="$BRANCH_OR_TAG"
            echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
            echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          fi
          cd tmp
          COMMIT_MESSAGE=$(git log --pretty=format:"%s" -n 1)
          if [[ -z "$COMMIT_MESSAGE" ]]; then
            echo "No commit message found"
          else
            echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          fi

      - id: set_version_code
        shell: bash
        run: |
          VERSION_CODE=$(date +%s)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Generated version code: $VERSION_CODE"

      - run: rsync -a --remove-source-files tmp/ .

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Cache Dart tool
        uses: actions/cache@v4
        with:
          path: .dart_tool
          # Include lib/** Dart source hashes so build_runner cache invalidates
          # when source files change (not only when pubspec.lock changes).
          key: ${{ runner.os }}-dart-tool-${{ hashFiles('**/pubspec.lock', 'lib/**/*.dart', 'packages/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-dart-tool-${{ hashFiles('**/pubspec.lock') }}
            ${{ runner.os }}-dart-tool-

      - run: flutter pub get
      - run: dart run build_runner build -d

      # ──────────────────────────────────────────────────────────────────────
      # Developer ID Application signing
      # Uses a real Apple Developer ID Application certificate (JDXS7993X9)
      # stored as a base64-encoded .p12 in GitHub Secrets. This preserves
      # Keychain entitlements (required for Firebase Auth deep-link login on
      # macOS) which are stripped by ad-hoc signing.
      #
      # Secrets required:
      # ──────────────────────────────────────────────────────────────────────
      - name: Import Developer ID Application certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # Create a temporary ephemeral keychain (deleted after upload)
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Write the p12 from the secret
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          # Import the certificate + private key (legacy format, macOS-compatible)
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access key without a UI prompt on the runner
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to the runner's keychain search list ahead of login.keychain
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Verify the identity is visible
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application"

          # Persist keychain path for cleanup step
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Inject GoogleService-Info.plist from Secrets
        env:
          MACOS_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          mkdir -p macos/Runner
          echo "$MACOS_GOOGLE_SERVICE_INFO_PLIST" > macos/Runner/GoogleService-Info.plist

      # ──────────────────────────────────────────────────────────────────────
      # Native library builds (llama.cpp + stable-diffusion.cpp)
      # These produce the static .a archives required by LlamaNative and
      # SdNative CocoaPods local pods. The build artifacts are gitignored so
      # they must be compiled from source on every fresh runner.
      # Cache is keyed on the CMakeLists.txt so a cache hit skips compilation.
      # Using explicit restore/save guarantees caching even if flutter fails.
      # ──────────────────────────────────────────────────────────────────────
      - name: Restore LlamaNative build artifacts
        id: cache-llama
        uses: actions/cache/restore@v4
        with:
          path: native/llama/build
          key: ${{ runner.os }}-llama-${{ hashFiles('native/llama/CMakeLists.txt', 'native/llama/build.sh') }}

      - name: Restore SdNative build artifacts
        id: cache-sd
        uses: actions/cache/restore@v4
        with:
          path: native/stable_diffusion/build
          key: ${{ runner.os }}-sd-${{ hashFiles('native/stable_diffusion/CMakeLists.txt', 'native/stable_diffusion/build.sh') }}

      - name: Build LlamaNative static libs (llama.cpp)
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          echo "=== Building LlamaNative (llama.cpp) ==="
          cd native/llama && ./build.sh

      - name: Save LlamaNative build artifacts
        if: steps.cache-llama.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: native/llama/build
          key: ${{ runner.os }}-llama-${{ hashFiles('native/llama/CMakeLists.txt', 'native/llama/build.sh') }}

      - name: Build SdNative static libs (stable-diffusion.cpp)
        if: steps.cache-sd.outputs.cache-hit != 'true'
        run: |
          echo "=== Building SdNative (stable-diffusion.cpp) ==="
          cd native/stable_diffusion && ./build.sh

      - name: Save SdNative build artifacts
        if: steps.cache-sd.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: native/stable_diffusion/build
          key: ${{ steps.cache-sd.outputs.cache-primary-key }}

      # ──────────────────────────────────────────────────────────────────────
      # Xcode build caches (CocoaPods + DerivedData)
      # CocoaPods: restoring macos/Pods skips pod install (~1-2 min).
      # DerivedData: restoring compiled frameworks/Swift modules skips
      # recompiling all pods when only Dart code changed (~7-8 min).
      # Keys include Podfile.lock + pubspec.lock so caches bust on dep changes.
      # ──────────────────────────────────────────────────────────────────────
      - name: Restore CocoaPods cache
        id: cache-pods
        uses: actions/cache/restore@v4
        with:
          path: macos/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('macos/Podfile', 'macos/Podfile.lock', 'native/llama/LlamaNative.podspec', 'native/stable_diffusion/SdNative.podspec') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Restore Xcode DerivedData cache
        id: cache-derived
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('macos/Podfile.lock', 'macos/Runner.xcodeproj/project.pbxproj', '**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-xcode-

      - name: Configure Xcode signing for CI
        run: |
          PBX=macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBX"
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBX"
          sed -i '' 's/Apple Development/-/g' "$PBX"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ""/PROVISIONING_PROFILE_SPECIFIER = "Aether macOS Developer ID"/g' "$PBX"
          echo "Xcode signing configured for CI ✓"

      - name: Install provisioning profile
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "${{ secrets.MAC_PROVISION_PROFILE }}" | base64 --decode > "$PP_DIR/aether_macos.provisionprofile"
          # Expand $(AppIdentifierPrefix) so the entitlement matches the Team ID prefix.
          sed -i '' 's/$(AppIdentifierPrefix)/JDXS7993X9./g' macos/Runner/Release.entitlements
          echo "Provisioning profile installed ✓"

      - name: Build macOS
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          flutter build macos \
            --build-name ${{ steps.set_build_name.outputs.build_name }} \
            --build-number ${{ steps.set_version_code.outputs.version_code }} \
            --dart-define-from-file=env/$ENV.json \
            --release \
            --flavor $ENV

      # ──────────────────────────────────────────────────────────────────────
      # Symbol audit — gates all downstream steps (caching, signing, notarization).
      # Catches the macOS 26 ld-prime dead-stripping regression where llama/ggml
      # symbols are silently absent from the binary even though the build succeeds.
      # Fails fast before wasting 5+ minutes on notarization of a broken binary.
      # ──────────────────────────────────────────────────────────────────────
      - name: Verify native symbols in macOS binary
        run: |
          APP=build/macos/Build/Products/Release/Farflung.app
          BINARY="$APP/Contents/MacOS/Farflung"

          echo "=== Native symbol audit ==="
          echo "Binary: $BINARY"
          echo "Size:   $(du -sh "$BINARY" | cut -f1)"

          # Extract arm64 slice for nm (universal binaries need lipo first)
          ARCH=$(lipo -archs "$BINARY" 2>/dev/null || echo "unknown")
          echo "Archs:  $ARCH"

          SLICE=/tmp/aether_macos_arm64_verify
          if echo "$ARCH" | grep -q "arm64"; then
            lipo -thin arm64 "$BINARY" -output "$SLICE" 2>/dev/null || cp "$BINARY" "$SLICE"
          else
            cp "$BINARY" "$SLICE"
          fi

          # Symbols to verify — archive origin in comment
          REQUIRED_SYMBOLS=(
            "llama_backend_init"        # libllama.a       — llama.cpp entrypoint
            "llama_model_load"          # libllama.a       — different TU, proves full archive
            "ggml_backend_init_best"    # libggml-cpu.a    — ggml backend selection
            "ggml_graph_compute"        # libggml.a        — core compute path
            "sd_bridge_generate"        # libsd_bridge.a   — stable-diffusion C bridge
          )

          MISSING=0
          FOUND=0

          printf "%-40s  %s\n" "Symbol" "Status"
          printf "%-40s  %s\n" "------" "------"

          for SYM in "${REQUIRED_SYMBOLS[@]}"; do
            # Strip inline comment
            NAME=$(echo "$SYM" | awk '{print $1}')
            if nm "$SLICE" 2>/dev/null | grep -q " T _${NAME}"; then
              ADDR=$(nm "$SLICE" 2>/dev/null | grep " T _${NAME}" | awk '{print $1}')
              printf "✅  %-38s  0x%s\n" "$NAME" "$ADDR"
              FOUND=$((FOUND + 1))
            else
              printf "❌  %-38s  NOT FOUND\n" "$NAME"
              MISSING=$((MISSING + 1))
            fi
          done

          rm -f "$SLICE"

          echo ""
          echo "Result: $FOUND found, $MISSING missing"

          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "::error::$MISSING native symbol(s) missing from binary."
            echo "::error::This indicates DEAD_CODE_STRIPPING stripped FFI symbols."
            echo "::error::Fix: ensure DEAD_CODE_STRIPPING=NO in project.pbxproj and"
            echo "::error::     libllama.a is NOT in LlamaNative.podspec vendored_libraries."
            echo "::error::Run locally: nm build/macos/Build/Products/Release/Farflung.app/Contents/MacOS/Farflung | grep llama_backend_init"
            exit 1
          fi

          echo "✅ All $FOUND symbols verified — binary is healthy, proceeding to packaging."

      - name: Save CocoaPods cache
        # Only write cache from main branch — prevents untrusted fork workflows
        # from poisoning the shared cache used by main branch builds.
        if: steps.cache-pods.outputs.cache-hit != 'true' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: macos/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('macos/Podfile', 'macos/Podfile.lock', 'native/llama/LlamaNative.podspec', 'native/stable_diffusion/SdNative.podspec') }}

      - name: Save Xcode DerivedData cache
        # Only write cache from main branch — same poison-prevention rationale.
        if: steps.cache-derived.outputs.cache-hit != 'true' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('macos/Podfile.lock', 'macos/Runner.xcodeproj/project.pbxproj', '**/pubspec.lock') }}

      - name: Prepare macOS artifact
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          mkdir -p macos_artifact
          cd build/macos/Build/Products/Release
          mv Farflung.app Aether.app

          CERT="$MACOS_SIGNING_IDENTITY"
          ENTITLEMENTS="../../../../../macos/Runner/Release.entitlements"
          PP="$HOME/Library/MobileDevice/Provisioning Profiles/aether_macos.provisionprofile"

          # ── Step 1: Repair versioned-framework symlinks ──────────────────
          # Xcode's framework-embedding copy (or the cache restore's tar)
          # sometimes dereferences symlinks into regular files. Without the
          # Versions/Current → A symlink and the root-level binary symlink,
          # codesign cannot determine the bundle type and reports
          # "bundle format is ambiguous", causing spctl / Gatekeeper to reject
          # the entire app.
          find Aether.app/Contents/Frameworks -maxdepth 1 -name "*.framework" | while read fw; do
            fw_name=$(basename "$fw" .framework)
            versions="$fw/Versions"
            if [ -d "$versions" ]; then
              # Restore Versions/Current → A symlink
              if [ -d "$versions/A" ] && [ ! -L "$versions/Current" ]; then
                rm -rf "$versions/Current"
                ln -s "A" "$versions/Current"
                echo "Restored symlink: $fw_name Versions/Current → A"
              fi
              # Restore root-level binary symlink
              if [ -f "$versions/Current/$fw_name" ] && [ ! -L "$fw/$fw_name" ]; then
                rm -f "$fw/$fw_name"
                ln -sf "Versions/Current/$fw_name" "$fw/$fw_name"
                echo "Restored symlink: $fw_name/$fw_name → Versions/Current/$fw_name"
              fi
              # Restore root-level Resources symlink
              if [ -d "$versions/Current/Resources" ] && [ ! -L "$fw/Resources" ]; then
                rm -rf "$fw/Resources"
                ln -sf "Versions/Current/Resources" "$fw/Resources"
                echo "Restored symlink: $fw_name/Resources → Versions/Current/Resources"
              fi
              # Restore root-level Headers symlink (if present)
              if [ -d "$versions/Current/Headers" ] && [ ! -L "$fw/Headers" ]; then
                rm -rf "$fw/Headers"
                ln -sf "Versions/Current/Headers" "$fw/Headers"
              fi
            fi
          done

          # ── Step 2: Remove stray CodeResources at Contents/ root ─────────
          # Artefact from a prior ad-hoc signing pass; confuses codesign's
          # bundle-type detection alongside the real _CodeSignature/ dir.
          rm -f Aether.app/Contents/CodeResources

          # ── Step 3: Embed provisioning profile ───────────────────────────
          cp "$PP" Aether.app/Contents/embedded.provisionprofile

          # ── Step 4: Sign dylibs ──────────────────────────────────────────
          find Aether.app -name "*.dylib" | while read lib; do
            codesign --force --options runtime --sign "$CERT" "$lib"
          done

          # ── Step 5: Sign frameworks (innermost first, NOT --deep) ────────
          # --deep is deprecated and silently skips flat-format bundles,
          # leaving invalid signatures that Gatekeeper rejects.
          find Aether.app/Contents/Frameworks -maxdepth 1 -name "*.framework" | while read fw; do
            codesign --force --options runtime --sign "$CERT" "$fw"
          done

          # ── Step 6: Sign the outer app bundle last ───────────────────────
          codesign --force --options runtime \
            --sign "$CERT" \
            --entitlements "$ENTITLEMENTS" \
            Aether.app

          codesign --verify --verbose Aether.app
          spctl --assess --verbose Aether.app 2>&1 || true
          echo "✅ Signing complete"

          ditto -c -k --keepParent Aether.app ../../../../../macos_artifact/Aether.zip
          cd ../../../../../

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARYTOOL_APP_PASSWORD: ${{ secrets.NOTARYTOOL_APP_PASSWORD }}
        run: |
          APP=build/macos/Build/Products/Release/Aether.app
          echo "Submitting to Apple notarization service..."
          xcrun notarytool submit macos_artifact/Aether.zip \
            --apple-id "$APPLE_ID" \
            --team-id "JDXS7993X9" \
            --password "$NOTARYTOOL_APP_PASSWORD" \
            --output-format json > submit_result.json

          cat submit_result.json
          SUBMISSION_ID=$(jq -r '.id' submit_result.json)
          echo "Submission ID: $SUBMISSION_ID"

          echo "Waiting for notarization to complete..."
          xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "JDXS7993X9" \
            --password "$NOTARYTOOL_APP_PASSWORD" \
            --timeout 10m

          STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "JDXS7993X9" \
            --password "$NOTARYTOOL_APP_PASSWORD" \
            --output-format json | jq -r '.status')

          echo "Notarization status: $STATUS"

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status $STATUS. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "JDXS7993X9" \
              --password "$NOTARYTOOL_APP_PASSWORD" \
              log.json
            cat log.json
            exit 1
          fi

          # Staple the notarization ticket directly to the .app bundle.
          # The ticket is indexed by the app's content hash (not the zip's hash).
          xcrun stapler staple "$APP"
          echo "✅ App stapled"
          # Now create the DMG from the already-stapled app.
          # The .app inside the DMG carries the notarization ticket — that is what
          # Gatekeeper checks. The DMG itself cannot be stapled unless it was directly
          # submitted to notarization (our ticket is for the zip, not this DMG).
          hdiutil create -volname "Aether" -srcfolder "$APP" -ov -format UDZO macos_artifact/Aether.dmg
          echo "✅ Notarization complete — app stapled, DMG contains notarized app"

      - uses: ryand56/r2-upload-action@latest
        name: Upload macOS files to R2
        with:
          r2-account-id: ${{ secrets.CF_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CF_R2_ACCESS_KEY }}
          r2-secret-access-key: ${{ secrets.CF_R2_SECRET_KEY }}
          r2-bucket: ${{ secrets.CF_R2_BUCKET }}
          source-dir: macos_artifact
          destination-dir: ${{ github.workflow }}-${{ github.event.client_payload.env || github.event.inputs.env }}/macos
          output-file-url: false
          multipart-size: 100
          max-retries: 5
          multipart-concurrent: true
          keep-file-fresh: true

      - name: Tag commit
        if: ${{ github.event.client_payload.env == 'dev' || github.event.inputs.env == 'dev' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO_AF }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.set_build_name.outputs.build_name }}"
          git push "https://ameya-ff:$GH_TOKEN@github.com/$OWNER/$REPO.git" "${{ steps.set_build_name.outputs.build_name }}"


      # ──────────────────────────────────────────────────────────────────────
      # Mac App Store / TestFlight Build
      # ──────────────────────────────────────────────────────────────────────
      - name: Import iOS/Mac App Distribution certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.AETHER_IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.AETHER_IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/ios_cert.p12"
          # Import into the existing build.keychain
          security import "$RUNNER_TEMP/ios_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/ios_cert.p12"

      - name: Import Mac Installer Distribution certificate
        env:
          MACOS_INSTALLER_CERT_BASE64: ${{ secrets.MACOS_INSTALLER_CERT_BASE64 }}
          MACOS_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
        run: |
          echo "$MACOS_INSTALLER_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/installer_cert.p12"
          security import "$RUNNER_TEMP/installer_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_INSTALLER_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Verify the installer identity is visible
          security find-identity -v "$KEYCHAIN_PATH" | grep -i "installer" || echo "⚠️  No installer identity found — pkg signing will fail"
          rm -f "$RUNNER_TEMP/installer_cert.p12"

      - name: Install Mac App Store provisioning profile
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "${{ secrets.AETHER_MACOS_APP_STORE_PROVISION_PROFILE_BASE64 }}" | base64 --decode > "$PP_DIR/aether_macos_appstore.provisionprofile"
          echo "Mac App Store Provisioning profile installed ✓"


      - name: Build macOS PKG for TestFlight
        env:
          MACOS_APP_STORE_SIGNING_IDENTITY: ${{ secrets.MACOS_APP_STORE_SIGNING_IDENTITY }}
        run: |
          APP=build/macos/Build/Products/Release/Aether.app
          PP="$HOME/Library/MobileDevice/Provisioning Profiles/aether_macos_appstore.provisionprofile"

          # Embed App Store provisioning profile (replaces Developer ID one)
          cp "$PP" "$APP/Contents/embedded.provisionprofile"

          # Extract entitlements from the provisioning profile.
          # The profile contains application-identifier and team-identifier which
          # MUST be present in the codesign signature for TestFlight (ITMS-90886).
          security cms -D -i "$PP" > /tmp/pp.plist
          /usr/libexec/PlistBuddy -x -c 'Print :Entitlements' /tmp/pp.plist > /tmp/mas_entitlements.plist
          
          # Merge the App Store profile entitlements with our base app capabilities (App Sandbox, etc)
          cp macos/Runner/Release.entitlements /tmp/merged.plist
          /usr/libexec/PlistBuddy -c "Merge /tmp/mas_entitlements.plist" /tmp/merged.plist
          echo "Merged entitlements for re-signing:"
          cat /tmp/merged.plist

          # Re-sign with App Store Distribution cert using the merged entitlements
          # (app was signed with Developer ID for R2/DMG; TestFlight needs App Store cert)
          codesign --force --deep --options runtime \
            --sign "$MACOS_APP_STORE_SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements /tmp/merged.plist \
            "$APP"
          codesign --verify --verbose "$APP"
          echo "✅ Re-signed with App Store Distribution cert + merged entitlements"

          # Create signed PKG — Apple requires the installer package to be
          # signed with a "3rd Party Mac Developer Installer" certificate.
          # Without --sign, altool rejects the upload with
          # "The product archive package's signature is invalid."
          mkdir -p build/macos/pkg
          productbuild --component "$APP" /Applications \
            --sign "${{ secrets.MACOS_INSTALLER_SIGNING_IDENTITY }}" \
            --keychain "$KEYCHAIN_PATH" \
            build/macos/pkg/Aether.pkg
          echo "✅ PKG created and signed with installer certificate"

      - name: Upload macOS PKG to TestFlight
        run: |
          echo "Xcode version: $(xcodebuild -version | head -1)"

          # Write App Store Connect API key to the standard location
          mkdir -p ~/private_keys
          echo "${{ secrets.AETHER_APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.AETHER_APP_STORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            -f build/macos/pkg/*.pkg \
            -t osx \
            --apiKey ${{ secrets.AETHER_APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.AETHER_APP_STORE_CONNECT_ISSUER_ID }}

      # Always clean up the ephemeral keychain — even on build failure —
      # to prevent the private key from persisting on the runner.
      - name: Cleanup ephemeral keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          echo "Keychain deleted."

  build-ios:
    name: Build Aether Flutter App (iOS)
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' || github.event.client_payload.platform == 'all' || github.event.client_payload.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - shell: bash
        env:
          BRANCH_OR_TAG: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO_AF }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone -b $BRANCH_OR_TAG --single-branch "https://ameya-ff:$GH_TOKEN@github.com/$OWNER/$REPO.git" tmp

      - id: set_build_name
        shell: bash
        env:
          BRANCH_OR_TAG: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          if [[ "${ENV}" == "dev" ]]; then
            BUILD_NAME="$(date +'%Y%m%d%H%M').0.0"
            echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
            echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          else
            BUILD_NAME="$BRANCH_OR_TAG"
            echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
            echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          fi
          cd tmp
          COMMIT_MESSAGE=$(git log --pretty=format:"%s" -n 1)
          if [[ -z "$COMMIT_MESSAGE" ]]; then
            echo "No commit message found"
          else
            echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          fi

      - id: set_version_code
        shell: bash
        run: |
          VERSION_CODE=$(date +%s)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Generated version code: $VERSION_CODE"

      - run: rsync -a --remove-source-files tmp/ .

      - name: Select latest Xcode (prefer Xcode 26+ for iOS 26 SDK)
        run: |
          echo "=== Installed Xcode versions ==="
          ls /Applications/ | grep -E '^Xcode' || echo "(none)"
          LATEST=$(ls /Applications/ | grep -E '^Xcode[_. ]?[0-9]' | sort -V | tail -1 || true)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"
            echo "Selected: /Applications/$LATEST"
          fi
          echo "Active Xcode: $(xcodebuild -version)"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Cache Dart tool
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-dart-tool-${{ hashFiles('**/pubspec.lock', 'lib/**/*.dart', 'packages/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-dart-tool-${{ hashFiles('**/pubspec.lock') }}
            ${{ runner.os }}-dart-tool-

      - run: flutter pub get
      - run: dart run build_runner build -d

      # ──────────────────────────────────────────────────────────────────────
      # iOS Distribution certificate + provisioning profile
      # ──────────────────────────────────────────────────────────────────────
      - name: Import iOS Distribution certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.AETHER_IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.AETHER_IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/ios_cert.p12"

          security import "$RUNNER_TEMP/ios_cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Distribution"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          rm -f "$RUNNER_TEMP/ios_cert.p12"

      - name: Install iOS provisioning profiles
        env:
          DEV_PROFILE_BASE64: ${{ secrets.AETHER_IOS_PROVISION_PROFILE_DEV_BASE64 }}
          DEV_PROFILE_NAME: ${{ secrets.AETHER_IOS_PROVISION_PROFILE_DEV_NAME }}
          PROD_PROFILE_BASE64: ${{ secrets.AETHER_IOS_PROVISION_PROFILE_BASE64 }}
          PROD_PROFILE_NAME: ${{ secrets.AETHER_IOS_PROVISION_PROFILE_NAME }}
          
          SHARE_EXT_DEV_BASE64: ${{ secrets.AETHER_SHARE_EXT_IOS_PROVISION_PROFILE_DEV_BASE64 }}
          SHARE_EXT_DEV_NAME: ${{ secrets.AETHER_SHARE_EXT_IOS_PROVISION_PROFILE_DEV_NAME }}
          SHARE_EXT_PROD_BASE64: ${{ secrets.AETHER_SHARE_EXT_IOS_PROVISION_PROFILE_BASE64 }}
          SHARE_EXT_PROD_NAME: ${{ secrets.AETHER_SHARE_EXT_IOS_PROVISION_PROFILE_NAME }}
          
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          if [[ "$ENV" == "dev" ]]; then
            MAIN_PROFILE_BASE64="$DEV_PROFILE_BASE64"
            MAIN_PROFILE_NAME="$DEV_PROFILE_NAME"
            SHARE_EXT_PROFILE_BASE64="$SHARE_EXT_DEV_BASE64"
            SHARE_EXT_PROFILE_NAME="$SHARE_EXT_DEV_NAME"
            SHARE_EXT_BUNDLE_ID="ai.farflung.aether.dev.ShareExtension"
          else
            MAIN_PROFILE_BASE64="$PROD_PROFILE_BASE64"
            MAIN_PROFILE_NAME="$PROD_PROFILE_NAME"
            SHARE_EXT_PROFILE_BASE64="$SHARE_EXT_PROD_BASE64"
            SHARE_EXT_PROFILE_NAME="$SHARE_EXT_PROD_NAME"
            SHARE_EXT_BUNDLE_ID="ai.farflung.aether.ShareExtension"
          fi

          # Write main app profile
          PP_PATH="$RUNNER_TEMP/aether_ios.mobileprovision"
          echo "$MAIN_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          cp "$PP_PATH" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"
          
          # Share Extension Profile
          PP_SHARE_EXT_PATH="$RUNNER_TEMP/aether_share_ext_ios.mobileprovision"
          echo "$SHARE_EXT_PROFILE_BASE64" | base64 --decode > "$PP_SHARE_EXT_PATH"
          cp "$PP_SHARE_EXT_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          cp "$PP_SHARE_EXT_PATH" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"
          
          # Export variables so they can be dynamically referenced downstream
          echo "IOS_PROVISION_PROFILE_NAME=$MAIN_PROFILE_NAME" >> $GITHUB_ENV
          echo "SHARE_EXT_IOS_PROVISION_PROFILE_NAME=$SHARE_EXT_PROFILE_NAME" >> $GITHUB_ENV
          echo "SHARE_EXT_BUNDLE_ID=$SHARE_EXT_BUNDLE_ID" >> $GITHUB_ENV
          echo "Provisioning profiles installed ✓ (both Xcode 15 + 16 locations)"

      - name: Patch Runner.entitlements — aps-environment to production
        run: |
          sed -i '' 's/<string>development<\/string>/<string>production<\/string>/g' ios/Runner/Runner.entitlements
          echo "Patched aps-environment → production ✓"



      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.AETHER_APP_STORE_CONNECT_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.AETHER_APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "API key written ✓"

      - name: Write ExportOptions.plist
        env:
          IOS_EXPORT_METHOD: ${{ github.event.client_payload.ios-export-method || github.event.inputs.ios-export-method || 'app-store' }}
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          if [[ "${ENV}" == "dev" ]]; then
            BUNDLE_ID="ai.farflung.aether.dev"
          else
            BUNDLE_ID="ai.farflung.aether"
          fi
          
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>JDXS7993X9</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${IOS_PROVISION_PROFILE_NAME}</string>
              <key>${SHARE_EXT_BUNDLE_ID}</key>
              <string>${SHARE_EXT_IOS_PROVISION_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "ExportOptions.plist written for ${BUNDLE_ID} ✓"

      - name: Configure Xcode signing for iOS CI
        run: |
          PBX=ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBX"
          sed -i '' 's/iPhone Developer/Apple Distribution/g' "$PBX"
          
          # Replace bundle ID dynamically if env is dev
          if [[ "$SHARE_EXT_BUNDLE_ID" != "ai.farflung.aether.ShareExtension" ]]; then
            sed -i '' "s/ai.farflung.aether.ShareExtension/$SHARE_EXT_BUNDLE_ID/g" "$PBX"
          fi
          
          # Inject provisioning profile specifier
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = $SHARE_EXT_BUNDLE_ID;/PRODUCT_BUNDLE_IDENTIFIER = $SHARE_EXT_BUNDLE_ID;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"$SHARE_EXT_IOS_PROVISION_PROFILE_NAME\";/g" "$PBX"
          echo "Xcode signing configured for iOS targets on CI ✓"

      - name: Build IPA
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
        run: |
          # Encode dart-defines from env JSON
          cat > /tmp/encode_defines.py << 'PYEOF'
          import json, base64, os
          env = os.environ['ENV']
          with open('env/' + env + '.json') as f:
              d = json.load(f)
          defines = [base64.b64encode((str(k) + '=' + str(v)).encode()).decode() for k, v in d.items()]
          print(','.join(defines))
          PYEOF
          DART_DEFINES=$(python3 /tmp/encode_defines.py)
          echo "Dart defines encoded OK"

          # Override signing to Manual via xcconfig (Release.xcconfig is the
          # baseConfigurationReference for Runner's Release + Profile configs).
          # Since Runner target has no CODE_SIGN_STYLE in its buildSettings,
          # xcconfig values take effect. The [sdk=iphoneos*] conditional overrides
          # the project-level "iPhone Developer" identity.
          cat >> ios/Flutter/Release.xcconfig << SIGNEOF
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY=Apple Distribution
          CODE_SIGN_IDENTITY[sdk=iphoneos*]=Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER=${IOS_PROVISION_PROFILE_NAME}
          SIGNEOF
          echo "Manual signing injected into Release.xcconfig ✓"

          # Use flutter build ipa instead of raw xcodebuild archive.
          # Flutter's tooling handles CocoaPods integration and signing correctly:
          # - Runs pod install internally
          # - Passes CODE_SIGN_STYLE=Manual only to the Runner target (not Pods)
          # - Uses ExportOptions.plist for the export step
          # The Podfile post_install hook sets CODE_SIGNING_ALLOWED=NO for all
          # Pod targets, preventing profile inheritance errors.
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-name="${{ steps.set_build_name.outputs.build_name }}" \
            --build-number="${{ steps.set_version_code.outputs.version_code }}" \
            --dart-define-from-file="env/${ENV}.json" \
            --flavor "${ENV}"

          echo "IPA: done"

      - uses: ryand56/r2-upload-action@latest
        name: Upload IPA to R2
        with:
          r2-account-id: ${{ secrets.CF_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CF_R2_ACCESS_KEY }}
          r2-secret-access-key: ${{ secrets.CF_R2_SECRET_KEY }}
          r2-bucket: ${{ secrets.CF_R2_BUCKET }}
          source-dir: build/ios/ipa
          destination-dir: ${{ github.workflow }}-${{ github.event.client_payload.env || github.event.inputs.env }}/ios
          output-file-url: false
          multipart-size: 100
          max-retries: 5
          multipart-concurrent: true
          keep-file-fresh: true

      - name: Upload to TestFlight
        run: |
          echo "Xcode version: $(xcodebuild -version | head -1)"

          # Write App Store Connect API key to the standard location
          mkdir -p ~/private_keys
          echo "${{ secrets.AETHER_APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.AETHER_APP_STORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            -f build/ios/ipa/*.ipa \
            -t ios \
            --apiKey ${{ secrets.AETHER_APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.AETHER_APP_STORE_CONNECT_ISSUER_ID }}

      # Always clean up — even on build failure
      - name: Cleanup ephemeral keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          echo "Keychain deleted."

      - name: Cleanup private_keys
        if: always()
        run: |
          rm -f ~/private_keys/AuthKey_${{ secrets.AETHER_APP_STORE_CONNECT_KEY_ID }}.p8
          echo "API key deleted."

  # ──────────────────────────────────────────────────────────────────────────
  # Trigger cleanup after all builds complete.
  # The cleanup workflow archives logs to farflungai/debug (private),
  # then deletes runs from this public repo.
  # ──────────────────────────────────────────────────────────────────────────
  trigger-cleanup:
    name: Trigger Log Cleanup
    needs: [build, build-macos, build-ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup workflow
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run cleanup-runs.yaml --repo "${{ github.repository }}" -f run_id="${{ github.run_id }}" || true
          echo "✅ Cleanup triggered for run ${{ github.run_id }}"
