name: Cleanup old workflow runs

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for triggering workflows to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Wait up to 2 minutes for any in-progress "Aether Flutter" runs to finish.
          # This ensures the build that triggered us has fully completed before we delete it.
          for i in $(seq 1 12); do
            IN_PROGRESS=$(gh run list --repo "${{ github.repository }}" \
              --workflow "Aether Flutter" \
              --status in_progress \
              --json databaseId --jq 'length')
            if [ "$IN_PROGRESS" -eq 0 ]; then
              echo "✅ No in-progress builds — proceeding to cleanup"
              break
            fi
            echo "⏳ $IN_PROGRESS build(s) still running, waiting 10s... ($i/12)"
            sleep 10
          done

      - name: Delete all completed workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete ALL completed runs from every workflow (except this current cleanup run)
          CURRENT_RUN_ID="${{ github.run_id }}"

          gh run list --repo "${{ github.repository }}" \
            --status completed \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId' \
          | while read -r id; do
            if [ "$id" != "$CURRENT_RUN_ID" ]; then
              echo "Deleting run $id..."
              gh run delete "$id" --repo "${{ github.repository }}" 2>/dev/null || true
            fi
          done
          echo "✅ All completed runs deleted"
