name: Cleanup old workflow runs

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Optional specific run ID to archive and delete'
        required: false
        type: string

jobs:
  archive-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for in-progress builds to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SPECIFIC_RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -n "$SPECIFIC_RUN_ID" ]; then
            echo "⏳ Waiting for specific run $SPECIFIC_RUN_ID to complete..."
            for i in $(seq 1 30); do
              STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/${SPECIFIC_RUN_ID}" --jq '.status' 2>/dev/null || echo "queued")
              if [ "$STATUS" = "completed" ]; then
                echo "✅ Run ${SPECIFIC_RUN_ID} has completed — proceeding"
                break
              fi
              echo "⏳ Run ${SPECIFIC_RUN_ID} is ${STATUS}, waiting 10s... ($i/30)"
              sleep 10
            done
          else
            echo "⏳ Waiting for Aether Flutter builds to complete..."
            for i in $(seq 1 24); do
              IN_PROGRESS=$(gh run list --repo "${{ github.repository }}" \
                --workflow "Aether Flutter" \
                --status in_progress \
                --json databaseId --jq 'length')
              if [ "$IN_PROGRESS" -eq 0 ]; then
                echo "✅ No in-progress builds — proceeding"
                break
              fi
              echo "⏳ $IN_PROGRESS build(s) still running, waiting 10s... ($i/24)"
              sleep 10
            done
          fi

      - name: Archive and delete completed runs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
        run: |
          set -euo pipefail

          # ── Get completed run(s) to process ─────────────────────────────
          SPECIFIC_RUN_ID="${{ github.event.inputs.run_id }}"
          if [ -n "$SPECIFIC_RUN_ID" ]; then
            RUNS=$(gh api "repos/${{ github.repository }}/actions/runs/${SPECIFIC_RUN_ID}" \
              --jq '"\(.id) \(.conclusion) \(.created_at)"' 2>/dev/null || true)
          else
            # ── Get all completed non-cleanup runs ──────────────────────────
            RUNS=$(gh run list --repo "${{ github.repository }}" \
              --status completed \
              --limit 100 \
              --json databaseId,name,createdAt,event,conclusion,headBranch \
              --jq '.[] | select(.name != "Cleanup old workflow runs") | "\(.databaseId) \(.conclusion) \(.createdAt)"' \
              2>/dev/null || true)
          fi

          if [ -z "$RUNS" ] || [ "$RUNS" = "null null null" ] || [ "$RUNS" = "  " ] || [ "$RUNS" = "null" ]; then
            echo "No completed runs to archive"
            exit 0
          fi

          # ── Clone private debug repo ────────────────────────────────────
          git clone --depth 1 "https://ameya-ff:${GH_TOKEN}@github.com/${OWNER}/debug.git" /tmp/debug
          ARCHIVED=0

          echo "$RUNS" | while read -r run_id conclusion created_at; do
            echo ""
            echo "═══════════════════════════════════════════════════════"
            echo "Processing run $run_id ($conclusion, $created_at)"
            echo "═══════════════════════════════════════════════════════"

            # ── Compute directory name from run metadata ────────────────
            DATE=$(echo "$created_at" | cut -c1-10 | tr -d '-')
            # Get workflow-level metadata
            RUN_META=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}" \
              --jq '{name, event, head_branch, run_number, display_title}' 2>/dev/null || echo '{}')
            RUN_TITLE=$(echo "$RUN_META" | jq -r '.display_title // "unknown"' 2>/dev/null || echo "unknown")
            RUN_NUMBER=$(echo "$RUN_META" | jq -r '.run_number // "0"' 2>/dev/null || echo "0")
            # Sanitize display_title → short slug (20 chars max)
            BUILD_SLUG=$(echo "$RUN_TITLE" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//' \
              | cut -c1-20)

            DIR_NAME="r${RUN_NUMBER}_${DATE}_${conclusion}_${BUILD_SLUG}"
            WORKFLOW_NAME=$(echo "$RUN_META" | jq -r '.name // "unknown"' | tr ' ' '-' | tr '[:upper:]' '[:lower:]' 2>/dev/null || echo "unknown")
            LOG_DIR="ci-logs/${WORKFLOW_NAME}/${DIR_NAME}"
            mkdir -p "/tmp/debug/${LOG_DIR}"

            # ── Fetch job metadata ──────────────────────────────────────
            JOBS_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/jobs" \
              --jq '.jobs[] | {name, status, conclusion, started_at, completed_at}' 2>/dev/null || echo '{}')

            # ── Write summary.md ────────────────────────────────────────
            cat > "/tmp/debug/${LOG_DIR}/summary.md" << SUMMARY_EOF
          # Build: ${run_id}

          **${RUN_TITLE}**

          | Field      | Value                     |
          |------------|---------------------------|
          | Run ID     | ${run_id}                 |
          | Result     | ${conclusion}             |
          | Created    | ${created_at}             |

          ## Job Results
          \`\`\`json
          ${JOBS_JSON}
          \`\`\`
          SUMMARY_EOF

            # ── Download full run log ───────────────────────────────────
            gh run view "${run_id}" --repo "${{ github.repository }}" --log \
              > "/tmp/debug/${LOG_DIR}/full.log" 2>/dev/null || true

            LOG_SIZE=$(wc -c < "/tmp/debug/${LOG_DIR}/full.log" | tr -d ' ')
            echo "📄 full.log (${LOG_SIZE} bytes)"

            # ── Delete run from public repo ─────────────────────────────
            gh run delete "${run_id}" --repo "${{ github.repository }}" 2>/dev/null || true
            echo "🗑️  Run $run_id deleted from public repo"
          done

          # ── Commit and push all archived logs ───────────────────────────
          cd /tmp/debug
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f ci-logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new logs to commit"
          else
            git commit -m "ci-logs: archive $(date -u +'%Y-%m-%d')"
            git push origin main
            echo "✅ All logs archived and runs deleted"
          fi

      - name: Delete own previous cleanup runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_RUN_ID="${{ github.run_id }}"
          gh run list --repo "${{ github.repository }}" \
            --workflow "Cleanup old workflow runs" \
            --status completed \
            --json databaseId --jq '.[].databaseId' \
          | while read -r id; do
            if [ "$id" != "$CURRENT_RUN_ID" ]; then
              gh run delete "$id" --repo "${{ github.repository }}" 2>/dev/null || true
            fi
          done
          echo "✅ Old cleanup runs deleted"
