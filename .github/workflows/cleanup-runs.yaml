name: Cleanup old workflow runs

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: Delete own previous cleanup runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete all previous cleanup runs (keep only the current one)
          gh run list --repo "${{ github.repository }}" \
            --workflow "Cleanup old workflow runs" \
            --json databaseId,status \
            --jq '.[] | select(.status == "completed") | .databaseId' \
          | while read -r id; do
            gh run delete "$id" --repo "${{ github.repository }}" 2>/dev/null || true
          done
          echo "✅ Old cleanup runs deleted"
