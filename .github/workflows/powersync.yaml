name: powersync
on:
  repository_dispatch:
    types: [trigger-powersync-workflow]
  workflow_dispatch:
    inputs:
      env:
        description: 'target env'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
      git-ref:
        description: 'git ref (backend)'
        required: true
        default: main
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.env || github.event.inputs.env }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy PowerSync Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v1
        with:
          token_format: access_token
          credentials_json: ${{ secrets.GCP_GKE_GITHUB_ACTIONS_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure gcloud
        shell: bash
        env:
          GCP_GKE_CLUSTER_NAME: ${{ secrets.GCP_GKE_CLUSTER_NAME }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud components install gke-gcloud-auth-plugin
          gcloud container clusters get-credentials $GCP_GKE_CLUSTER_NAME --region $GCP_REGION

      - name: Patch and Deploy PowerSync
        shell: bash
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
          NAMESPACE: ${{ secrets.GCP_GKE_NAMESPACE_F }}
          OWNER: ${{ secrets.OWNER }}
          REPO_BACKEND: ${{ secrets.REPO_B }}
          TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_REF: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
        run: |
          git clone -b main --single-branch "https://ameya-ff:$TOKEN@github.com/$OWNER/infra.git" infra
          git clone -b $GIT_REF --single-branch "https://ameya-ff:$TOKEN@github.com/$OWNER/$REPO_BACKEND.git" backend

          # Execute patch script to place sync-rules inside the configmap
          python3 infra/gke/k8s/aether/$ENV/patch-sync-rules.py \
            backend/powersync-config/sync-rules.yaml \
            infra/gke/k8s/aether/$ENV/configmap-powersync.yaml

          # Apply only updated PowerSync resources, rather than the entire kustomization directory
          kubectl apply -n $NAMESPACE --server-side --force-conflicts \
            -f infra/gke/k8s/aether/$ENV/configmap-powersync.yaml \
            -f infra/gke/k8s/aether/$ENV/statefulset-powersync-mongo.yaml \
            -f infra/gke/k8s/aether/$ENV/deployment-powersync.yaml

          # Restart the powersync deployment to pick up updated configmap
          if kubectl get deployment powersync -n $NAMESPACE &>/dev/null; then
            kubectl patch deployment powersync -n $NAMESPACE \
              -p "{\"spec\":{\"template\":{\"metadata\":{\"labels\":{\"date\":\"$(date +'%s')\"}}}}}"
            echo "✓ PowerSync restarted successfully."
          else
            echo "::error::PowerSync deployment not found in namespace $NAMESPACE"
            exit 1
          fi

  trigger-cleanup:
    name: Trigger Log Cleanup
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup workflow
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run "Cleanup old workflow runs" --repo "${{ github.repository }}" -f run_id="${{ github.run_id }}" || true
          echo "✅ Cleanup triggered for run ${{ github.run_id }}"
