name: aether
on:
  repository_dispatch:
    types: [trigger-aether-workflow]
  workflow_dispatch:
    inputs:
      env:
        description: target env
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
      git-ref:
        description: git ref
        required: true
        default: main

# If another release happens while this workflow is still running,
# cancel the earlier run in favor of the next run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.env || github.event.inputs.env }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Aether Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # aether-core and aether-worker share the same Dockerfile (aether/ dir)
          # with a multi-stage build using the 'prod' target.
          # The worker differs only by command override in the K8s deployment.
          - service: aether
            docker_dir: backend/aether
            target: prod
          - service: aether-browser
            docker_dir: backend/aether-browser
            target: ""
          - service: aether-audio
            docker_dir: backend/aether-audio
            target: ""
          - service: aether-image
            docker_dir: backend/aether-image
            target: ""

    steps:
      - uses: actions/checkout@v3
      - name: Clone backend repo
        shell: bash
        env:
          BRANCH_OR_TAG: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO_B }}
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone -b $BRANCH_OR_TAG --single-branch "https://ameya-ff:$TOKEN@github.com/$OWNER/$REPO.git" tmp
          mv tmp/* .
      - name: Determine build metadata
        shell: bash
        env:
          BRANCH_OR_TAG: ${{ github.event.client_payload.git-ref || github.event.inputs.git-ref }}
        run: |
          cd tmp
          COMMIT_MESSAGE=$(git log --pretty=format:"%s" -n 1)
          BUILD_NAME="v$(date +'%Y-%m-%d::%H:%M:%S')"
          if [[ -n "$COMMIT_MESSAGE" ]]; then
            echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
            echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          fi
          if [[ "$BRANCH_OR_TAG" == "main" ]]; then
            GIT_SHA=$(git rev-parse --short HEAD)
          else
            GIT_SHA=$BRANCH_OR_TAG
          fi
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          cd ..
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v1
        with:
          token_format: access_token
          credentials_json: ${{ secrets.GCP_GKE_GITHUB_ACTIONS_SA_KEY }}
      - name: Login to GAR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_GAR_DOCKER_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ${{ matrix.docker_dir }}/
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.GCP_GAR_DOCKER_BASE_URL }}/${{ matrix.service }}:latest
            ${{ secrets.GCP_GAR_DOCKER_BASE_URL }}/${{ matrix.service }}:${{ env.GIT_SHA }}
          target: ${{ matrix.target || '' }}
          build-args: |
            GIT_SHA=${{ env.GIT_SHA }}

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v1
        with:
          token_format: access_token
          credentials_json: ${{ secrets.GCP_GKE_GITHUB_ACTIONS_SA_KEY }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Configure gcloud
        shell: bash
        env:
          GCP_GKE_CLUSTER_NAME: ${{ secrets.GCP_GKE_CLUSTER_NAME }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud components install gke-gcloud-auth-plugin
          gcloud container clusters get-credentials $GCP_GKE_CLUSTER_NAME --region $GCP_REGION
      - name: Deploy
        shell: bash
        env:
          ENV: ${{ github.event.client_payload.env || github.event.inputs.env }}
          NAMESPACE: ${{ secrets.GCP_GKE_NAMESPACE_F }}
          REPO: ${{ secrets.REPO_B }}
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone -b main --single-branch "https://ameya-ff:$TOKEN@github.com/$OWNER/$REPO.git" tmp
          mv tmp/* .
          kubectl apply -k infra/gke/k8s/aether/$ENV/

          # Rolling restart all aether deployments to pick up new images
          for DEPLOY in aether-core aether-worker aether-browser aether-audio aether-image; do
            if kubectl get deployment $DEPLOY -n $NAMESPACE &>/dev/null; then
              kubectl patch deployment $DEPLOY -n $NAMESPACE \
                -p "{\"spec\":{\"template\":{\"metadata\":{\"labels\":{\"date\":\"$(date +'%s')\"}}}}}"
            fi
          done
